name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Dummy .env File
        run: echo "GEMINI_API_KEY=dummy_key_for_testing" > .env

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Drift & Riverpod Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Tests
        run: flutter test

      - name: Build Split-per-ABI Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Draft GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/DuaSaku-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
