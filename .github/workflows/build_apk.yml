name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Dummy .env File
        run: echo "GEMINI_API_KEY=dummy_key_for_testing" > .env

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Android SDK Components (NDK & CMake)
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "cmake;3.22.1" "ndk;27.0.12077973" || true
          # Fallback: try with different CMake version if 3.22.1 fails
          if [ ! -d "${ANDROID_SDK_ROOT}/cmake/3.22.1" ]; then
            echo "CMake 3.22.1 install failed, trying alternative install..."
            sudo apt-get update && sudo apt-get install -y cmake ninja-build
            mkdir -p "${ANDROID_SDK_ROOT}/cmake/3.22.1/bin"
            ln -sf "$(which cmake)" "${ANDROID_SDK_ROOT}/cmake/3.22.1/bin/cmake"
            ln -sf "$(which ninja)" "${ANDROID_SDK_ROOT}/cmake/3.22.1/bin/ninja"
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Generate Drift & Riverpod Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build Universal Release APK
        run: flutter build apk --release

      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/DuaSaku-v${{ github.ref_name }}-universal.apk

      - name: Build Split-per-ABI Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename Split APKs for Release
        run: |
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/DuaSaku-v${{ github.ref_name }}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/DuaSaku-v${{ github.ref_name }}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/DuaSaku-v${{ github.ref_name }}-x86_64.apk

      - name: Draft GitHub Release & Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/DuaSaku-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
