name: Ultimate Pipeline (Build & E2E)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --clean

      - name: 🚀 Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuaSaku-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 📢 Discord Notification (Success)
        if: success()
        uses: rtCamp/action-discord-notifier@v2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_MESSAGE: "🚀 Build APK Selesai! Versi terbaru siap dites."
          DISCORD_COLOR: "#28a745"

      - name: 📢 Discord Notification (Failure)
        if: failure()
        uses: rtCamp/action-discord-notifier@v2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_MESSAGE: "❌ Build APK Gagal! Cek log GitHub Actions."
          DISCORD_COLOR: "#dc3545"

  test:
    name: 🧪 Maestro E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: DuaSaku-Release-APK
          path: android-build

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦅 Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 📱 Run E2E Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install android-build/app-release.apk
            maestro test e2e/

      - name: 📤 Upload Error Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Maestro-Error-Reports
          path: |
            ~/.maestro/tests/
            android-build/
          retention-days: 3

      - name: 🧹 Cleanup Test Data
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/cleanup-test-data.js

      - name: 🤖 Discord Result
        if: always()
        uses: rtCamp/action-discord-notifier@v2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: "DuaSaku Bot"
          DISCORD_MESSAGE: "🤖 E2E Test Selesai!\nStatus: **${{ job.status }}**\nLink: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
