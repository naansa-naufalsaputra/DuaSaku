name: Ultimate Pipeline (Build & E2E)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit:
    name: 🏥 Health Audit
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 🩺 React Doctor Audit
        run: npx -y react-doctor@latest .

      - name: 🔍 Knip Unused Code Check
        run: npx -y knip@latest

  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: 🧪 Run Unit Tests (Logic & UI Snapshots)
        run: npm run test:unit

      - name: 🔐 Inject .env Secrets
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_GEMINI_API_KEY=${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.EXPO_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}" >> .env

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --clean

      - name: 🚀 Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuaSaku-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 📢 Discord Notification
        if: always()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | head -n 1)
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 **Build APK Selesai!**\nStatus: **${{ job.status }}**\nProject: **DuaSaku**\nCommit: \`$COMMIT_MSG\`\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

  test:
    name: 🧪 Maestro E2E Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: DuaSaku-Release-APK
          path: android-build

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦅 Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 📱 Run E2E Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install android-build/app-release.apk
            maestro test e2e/

      - name: 📤 Upload Error Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Maestro-Error-Reports
          path: |
            ~/.maestro/tests/
            android-build/
          retention-days: 3

      - name: 🧹 Cleanup Test Data
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.EXPO_PUBLIC_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm install @supabase/supabase-js
          node scripts/cleanup-test-data.js

      - name: 🤖 Discord Result
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🤖 **E2E Test Selesai!**\nStatus: **${{ job.status }}**\nLink: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
