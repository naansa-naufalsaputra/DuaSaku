appId: com.example.duasaku_app
---
- launchApp
- tapOn: "fab_new_transaction"
- tapOn: "manual_tab_header"
- tapOn: "amount_input"
- inputText: "50000"
- tapOn: "category_input"
- inputText: "Food"
- tapOn: "save_transaction_button"
# Assert that the transaction category or item is now visible in the list on the Home Screen
- assertVisible: "Food"
